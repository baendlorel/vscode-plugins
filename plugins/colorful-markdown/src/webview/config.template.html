<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="__CSP__" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%26%239881%3B%3C/text%3E%3C/svg%3E" />
  <title>Colorful Markdown Config</title>
  <style>
    :root {
      color-scheme: light dark;
      --cm-border: rgba(160, 160, 160, 0.4);
    }

    body {
      margin: 0;
      color: var(--vscode-foreground);
      background: var(--vscode-editor-background);
      font-family: var(--vscode-font-family);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      margin: 0;
      font-size: 1.4rem;
    }

    p {
      margin: 8px 0 0;
      color: var(--vscode-descriptionForeground);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin: 18px 0;
    }

    button {
      border: 1px solid var(--vscode-button-border, transparent);
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      color: var(--vscode-button-foreground);
      background: var(--vscode-button-background);
    }

    button.secondary {
      color: var(--vscode-foreground);
      background: var(--vscode-input-background);
    }

    select {
      border: 1px solid var(--vscode-input-border, var(--cm-border));
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--vscode-input-foreground);
      background: var(--vscode-input-background);
      font-family: var(--vscode-font-family);
    }

    .status {
      margin-left: auto;
      color: var(--vscode-descriptionForeground);
    }

    .status.error {
      color: var(--vscode-errorForeground);
    }

    .filter-wrap {
      margin: -8px 0 14px;
    }

    .filter-input {
      width: 100%;
      max-width: 420px;
      border: 1px solid var(--vscode-input-border, var(--cm-border));
      border-radius: 6px;
      padding: 6px 10px;
      box-sizing: border-box;
      color: var(--vscode-input-foreground);
      background: var(--vscode-input-background);
      font-family: var(--vscode-font-family);
      font-size: 0.9rem;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .card {
      border: 1px solid var(--vscode-panel-border);
      border-radius: 8px;
      padding: 12px;
      background: color-mix(in srgb, var(--vscode-editor-background) 88%, var(--vscode-editorWidget-background) 12%);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    .card p {
      margin: 0 0 8px;
      font-size: 0.85rem;
    }

    .config-table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--cm-border);
      table-layout: fixed;
    }

    .config-table td {
      border: 1px solid var(--cm-border);
      padding: 4px 6px;
    }

    .field-label {
      width: 150px;
      font-family: var(--vscode-editor-font-family);
      font-size: 0.7rem;
      color: var(--vscode-descriptionForeground);
    }

    .field-input {
      width: auto;
    }

    .field-empty {
      width: auto;
    }

    .config-input {
      width: 100%;
      border: 1px solid var(--vscode-input-border, var(--cm-border));
      border-radius: 4px;
      padding: 5px 6px;
      box-sizing: border-box;
      color: var(--vscode-input-foreground);
      background: var(--vscode-input-background);
      font-family: var(--vscode-editor-font-family);
      font-size: 12px;
    }

    .preview-line {
      margin-top: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .element-name {
      margin-right: 6px;
      color: var(--vscode-descriptionForeground);
      font-size: 0.8rem;
      font-weight: 500;
      border: 1px solid var(--cm-border);
      border-radius: 10px;
      padding: 1px 6px;
      line-height: 1.3;
    }

    .preview-target {
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .preview-attachment,
    .preview-gutter {
      white-space: pre-wrap;
    }

    .preview-icon {
      width: 1em;
      height: 1em;
      object-fit: contain;
      vertical-align: middle;
    }

    .preview-icon-badge {
      display: inline-block;
      border: 1px solid var(--cm-border);
      border-radius: 10px;
      padding: 0 6px;
      font-size: 0.75rem;
      line-height: 1.2;
    }

    .hidden {
      display: none;
    }

    .hidden-by-filter {
      display: none;
    }
  </style>
</head>

<body>
  <main>
    <h1>Colorful Markdown Style Config</h1>
    <p>
      Default styles are empty. Choose a light/dark preset theme or edit manually. Simple options are shown by
      default.
    </p>
    <div class="actions">
      <button id="save">Save</button>
      <button id="reload" class="secondary">Reload Settings</button>
      <button id="defaults" class="secondary">Clear Styles</button>
      <select id="preset-select" aria-label="Style preset"></select>
      <button id="apply-preset" class="secondary">Apply Preset</button>
      <button id="toggle-advanced" class="secondary">Toggle Advanced Options</button>
      <span id="status" class="status" role="status"></span>
    </div>
    <div class="filter-wrap">
      <input
        id="filter-input"
        class="filter-input"
        type="text"
        placeholder="Filter items, e.g. heading / h1 / code"
      />
    </div>
    <section id="cards" class="cards"></section>
  </main>

  <script nonce="__NONCE__">
    (() => {
      const vscode = acquireVsCodeApi();
      const markdownElements = __MARKDOWN_ELEMENTS__;
      const defaultStyles = __DEFAULT_STYLES__;
      const stylePresets = __STYLE_PRESETS__;
      const initialStyles = __INITIAL_STYLES__;

      const cardsRoot = document.getElementById('cards');
      const statusNode = document.getElementById('status');
      const saveButton = document.getElementById('save');
      const reloadButton = document.getElementById('reload');
      const defaultsButton = document.getElementById('defaults');
      const presetSelect = document.getElementById('preset-select');
      const applyPresetButton = document.getElementById('apply-preset');
      const toggleAdvancedButton = document.getElementById('toggle-advanced');
      const filterInput = document.getElementById('filter-input');

      const SAMPLE_TEXT = {
        heading: '# Base Heading',
        heading1: '# Heading 1',
        heading2: '## Heading 2',
        heading3: '### Heading 3',
        heading4: '#### Heading 4',
        heading5: '##### Heading 5',
        heading6: '###### Heading 6',
        blockquote: '> Blockquote line',
        list: '- List item',
        bold: '**bold text**',
        italic: '*italic text*',
        strikethrough: '~~strikethrough~~',
        link: '[link](https://example.com)',
        inlineCode: '`const x = 1`',
        codeFence: '```ts\nconst value = 1;\n```',
      };

      const BASIC_TOP_LEVEL_FIELDS = new Set([
        'background',
        'color',
        'decoration',
        'fontweight',
        'fontstyle',
        'border',
        'borderRadius',
        'opacity',
      ]);

      const BASIC_ATTACHMENT_FIELDS = new Set([
        'contentText',
        'color',
      ]);

      const TOP_LEVEL_FIELDS = [
        { label: 'background', path: ['background'] },
        { label: 'color', path: ['color'] },
        { label: 'decoration', path: ['decoration'] },
        { label: 'fontweight', path: ['fontweight'] },
        { label: 'fontstyle', path: ['fontstyle'] },
        { label: 'border', path: ['border'] },
        { label: 'borderColor', path: ['borderColor'] },
        { label: 'borderRadius', path: ['borderRadius'] },
        { label: 'borderStyle', path: ['borderStyle'] },
        { label: 'borderWidth', path: ['borderWidth'] },
        { label: 'borderSpacing', path: ['borderSpacing'] },
        { label: 'outline', path: ['outline'] },
        { label: 'outlineColor', path: ['outlineColor'] },
        { label: 'outlineStyle', path: ['outlineStyle'] },
        { label: 'outlineWidth', path: ['outlineWidth'] },
        { label: 'opacity', path: ['opacity'] },
        { label: 'letterSpacing', path: ['letterSpacing'] },
        { label: 'gutterIconPath', path: ['gutterIconPath'] },
        { label: 'gutterIconSize', path: ['gutterIconSize'] },
        { label: 'isWholeLine', path: ['isWholeLine'], type: 'boolean' },
      ].map((field) => ({ ...field, advanced: !BASIC_TOP_LEVEL_FIELDS.has(field.label) }));

      const ATTACHMENT_FIELDS = [
        { label: 'contentText', path: ['contentText'] },
        { label: 'contentIconPath', path: ['contentIconPath'] },
        { label: 'border', path: ['border'] },
        { label: 'borderColor', path: ['borderColor'] },
        { label: 'color', path: ['color'] },
        { label: 'background', path: ['background'] },
        { label: 'fontweight', path: ['fontweight'] },
        { label: 'fontstyle', path: ['fontstyle'] },
        { label: 'decoration', path: ['decoration'] },
        { label: 'margin', path: ['margin'] },
        { label: 'width', path: ['width'] },
        { label: 'height', path: ['height'] },
      ];

      const FIELD_DEFINITIONS = TOP_LEVEL_FIELDS.concat(
        ATTACHMENT_FIELDS.map((field) => ({
          label: `before.${field.label}`,
          path: ['before'].concat(field.path),
          advanced: !BASIC_ATTACHMENT_FIELDS.has(field.label),
        })),
        ATTACHMENT_FIELDS.map((field) => ({
          label: `after.${field.label}`,
          path: ['after'].concat(field.path),
          advanced: !BASIC_ATTACHMENT_FIELDS.has(field.label),
        })),
      );

      const PREVIEW_STYLE_FIELDS = [
        ['background', 'background'],
        ['color', 'color'],
        ['decoration', 'textDecoration'],
        ['fontweight', 'fontWeight'],
        ['fontstyle', 'fontStyle'],
        ['border', 'border'],
        ['borderColor', 'borderColor'],
        ['borderRadius', 'borderRadius'],
        ['borderStyle', 'borderStyle'],
        ['borderWidth', 'borderWidth'],
        ['borderSpacing', 'borderSpacing'],
        ['outline', 'outline'],
        ['outlineColor', 'outlineColor'],
        ['outlineStyle', 'outlineStyle'],
        ['outlineWidth', 'outlineWidth'],
        ['opacity', 'opacity'],
        ['letterSpacing', 'letterSpacing'],
      ];

      const PREVIEW_ATTACHMENT_FIELDS = [
        ['border', 'border'],
        ['borderColor', 'borderColor'],
        ['color', 'color'],
        ['background', 'background'],
        ['fontweight', 'fontWeight'],
        ['fontstyle', 'fontStyle'],
        ['decoration', 'textDecoration'],
        ['margin', 'margin'],
        ['width', 'width'],
        ['height', 'height'],
      ];

      const inputs = new Map();
      const previews = new Map();
      const cardStates = new Map();
      let showAdvanced = false;

      const ELEMENT_FILTER_ALIASES = {
        heading: 'title',
        heading1: 'h1 #',
        heading2: 'h2 ##',
        heading3: 'h3 ###',
        heading4: 'h4 ####',
        heading5: 'h5 #####',
        heading6: 'h6 ######',
        blockquote: 'quote',
      };

      const isRecord = (value) => !!value && typeof value === 'object' && !Array.isArray(value);

      const toInputKey = (element, fieldLabel) => `${element}::${fieldLabel}`;

      const toStatePayload = (styles) => ({
        styles,
        showAdvanced,
      });

      const updateToggleAdvancedMeta = () => {
        toggleAdvancedButton.setAttribute('aria-pressed', String(showAdvanced));
        toggleAdvancedButton.title = showAdvanced ? 'Advanced options shown' : 'Advanced options hidden';
      };

      const normalizedPresets = Array.isArray(stylePresets)
        ? stylePresets
            .filter((preset) => isRecord(preset) && typeof preset.id === 'string' && isRecord(preset.styles))
            .map((preset) => ({
              id: preset.id,
              label: typeof preset.label === 'string' ? preset.label : preset.id,
              mode: preset.mode === 'light' ? 'light' : 'dark',
              styles: preset.styles,
            }))
        : [];

      const renderPresetOptions = () => {
        clearNode(presetSelect);
        if (normalizedPresets.length === 0) {
          const option = document.createElement('option');
          option.value = '';
          option.textContent = 'No presets';
          presetSelect.appendChild(option);
          presetSelect.disabled = true;
          applyPresetButton.disabled = true;
          return;
        }

        const groups = {
          dark: [],
          light: [],
        };
        normalizedPresets.forEach((preset) => {
          groups[preset.mode].push(preset);
        });

        [
          ['dark', 'Dark Themes'],
          ['light', 'Light Themes'],
        ].forEach(([mode, title]) => {
          const items = groups[mode];
          if (!items || items.length === 0) {
            return;
          }
          const group = document.createElement('optgroup');
          group.label = title;
          items.forEach((preset) => {
            const option = document.createElement('option');
            option.value = preset.id;
            option.textContent = preset.label;
            group.appendChild(option);
          });
          presetSelect.appendChild(group);
        });
      };

      const readPresetStyles = (preset) => {
        const styles = {};
        markdownElements.forEach((element) => {
          const value = preset.styles[element];
          styles[element] = isRecord(value) ? value : {};
        });
        return styles;
      };

      const clearNode = (node) => {
        while (node.firstChild) {
          node.removeChild(node.firstChild);
        }
      };

      const getNested = (obj, path) => {
        let current = obj;
        for (const segment of path) {
          if (!isRecord(current) || !(segment in current)) {
            return undefined;
          }
          current = current[segment];
        }
        return current;
      };

      const setNested = (obj, path, value) => {
        let current = obj;
        for (let index = 0; index < path.length - 1; index += 1) {
          const segment = path[index];
          if (!isRecord(current[segment])) {
            current[segment] = {};
          }
          current = current[segment];
        }
        current[path[path.length - 1]] = value;
      };

      const readFieldValue = (field, rawValue) => {
        const value = rawValue.trim();
        if (!value) {
          return { unset: true };
        }
        if (field.type === 'boolean') {
          const lowered = value.toLowerCase();
          if (lowered === 'true') {
            return { value: true };
          }
          if (lowered === 'false') {
            return { value: false };
          }
          return { error: 'Expected true or false.' };
        }
        return { value };
      };

      const formatFieldValue = (field, value) => {
        if (field.type === 'boolean') {
          return typeof value === 'boolean' ? String(value) : '';
        }
        return typeof value === 'string' ? value : '';
      };

      const applyCssMapping = (node, style, mapping) => {
        node.removeAttribute('style');
        if (!isRecord(style)) {
          return;
        }
        for (const [styleKey, cssKey] of mapping) {
          const value = style[styleKey];
          if (typeof value === 'string' && value.trim()) {
            node.style[cssKey] = value.trim();
          }
        }
      };

      const renderAttachment = (target, attachmentStyle) => {
        clearNode(target);
        target.classList.add('hidden');
        applyCssMapping(target, attachmentStyle, PREVIEW_ATTACHMENT_FIELDS);
        if (!isRecord(attachmentStyle)) {
          return;
        }

        const textValue = typeof attachmentStyle.contentText === 'string' ? attachmentStyle.contentText : '';
        const iconValue = typeof attachmentStyle.contentIconPath === 'string' ? attachmentStyle.contentIconPath.trim() : '';

        if (textValue) {
          target.appendChild(document.createTextNode(textValue));
        }

        if (iconValue) {
          if (iconValue.startsWith('http://') || iconValue.startsWith('https://') || iconValue.startsWith('data:')) {
            const icon = document.createElement('img');
            icon.src = iconValue;
            icon.alt = '';
            icon.className = 'preview-icon';
            target.appendChild(icon);
          }
          const badge = document.createElement('span');
          badge.className = 'preview-icon-badge';
          badge.textContent = 'icon';
          badge.title = iconValue;
          target.appendChild(badge);
        }

        if (target.childNodes.length > 0) {
          target.classList.remove('hidden');
        }
      };

      const renderGutter = (target, style) => {
        clearNode(target);
        target.classList.add('hidden');
        if (!isRecord(style)) {
          return;
        }
        const iconPath = typeof style.gutterIconPath === 'string' ? style.gutterIconPath.trim() : '';
        if (!iconPath) {
          return;
        }
        const badge = document.createElement('span');
        badge.className = 'preview-icon-badge';
        badge.textContent = 'gutter icon';
        badge.title = iconPath;
        const iconSize = typeof style.gutterIconSize === 'string' ? style.gutterIconSize.trim() : '';
        if (iconSize) {
          badge.style.fontSize = iconSize;
        }
        target.appendChild(badge);
        target.classList.remove('hidden');
      };

      const collectElementStyle = (element) => {
        const style = {};
        for (const field of FIELD_DEFINITIONS) {
          const input = inputs.get(toInputKey(element, field.label));
          if (!input) {
            continue;
          }
          const parsed = readFieldValue(field, input.value);
          if (parsed.error) {
            return {
              ok: false,
              field: field.label,
              message: parsed.error,
            };
          }
          if (parsed.unset) {
            continue;
          }
          setNested(style, field.path, parsed.value);
        }
        return {
          ok: true,
          style,
        };
      };

      const renderFieldsForElement = (element) => {
        const state = cardStates.get(element);
        if (!state) {
          return;
        }

        clearNode(state.body);
        const visibleControls = state.fieldControls.filter((control) => showAdvanced || !control.field.advanced);

        for (let index = 0; index < visibleControls.length; index += 3) {
          const row = document.createElement('tr');
          const first = visibleControls[index];
          const second = visibleControls[index + 1];
          const third = visibleControls[index + 2];

          row.appendChild(first.labelCell);
          row.appendChild(first.inputCell);

          if (second) {
            row.appendChild(second.labelCell);
            row.appendChild(second.inputCell);
          } else {
            const empty = document.createElement('td');
            empty.colSpan = 2;
            empty.className = 'field-empty';
            row.appendChild(empty);
          }

          if (third) {
            row.appendChild(third.labelCell);
            row.appendChild(third.inputCell);
          } else {
            const empty = document.createElement('td');
            empty.colSpan = 2;
            empty.className = 'field-empty';
            row.appendChild(empty);
          }

          state.body.appendChild(row);
        }
      };

      const renderAllFieldRows = () => {
        for (const element of markdownElements) {
          renderFieldsForElement(element);
        }
        updateToggleAdvancedMeta();
        applyElementFilter();
      };

      const applyElementFilter = () => {
        const keyword = filterInput.value.trim().toLowerCase();
        markdownElements.forEach((element) => {
          const state = cardStates.get(element);
          if (!state) {
            return;
          }
          const isVisible = keyword.length === 0 || state.searchText.includes(keyword);
          state.card.classList.toggle('hidden-by-filter', !isVisible);
        });
      };

      const updatePreview = (element) => {
        const preview = previews.get(element);
        if (!preview) {
          return;
        }
        const result = collectElementStyle(element);
        if (!result.ok) {
          return;
        }

        const style = result.style;
        preview.target.textContent = SAMPLE_TEXT[element] || 'sample';
        applyCssMapping(preview.target, style, PREVIEW_STYLE_FIELDS);
        renderAttachment(preview.before, style.before);
        renderAttachment(preview.after, style.after);
        renderGutter(preview.gutter, style);
      };

      const createPreview = (element) => {
        const line = document.createElement('div');
        line.className = 'preview-line';

        const name = document.createElement('span');
        name.className = 'element-name';
        name.textContent = element;

        const gutter = document.createElement('span');
        gutter.className = 'preview-gutter hidden';

        const before = document.createElement('span');
        before.className = 'preview-attachment hidden';

        const target = document.createElement('span');
        target.className = 'preview-target';

        const after = document.createElement('span');
        after.className = 'preview-attachment hidden';

        line.appendChild(name);
        line.appendChild(gutter);
        line.appendChild(before);
        line.appendChild(target);
        line.appendChild(after);

        return { line, gutter, before, target, after };
      };

      const createCard = (element) => {
        const card = document.createElement('article');
        card.className = 'card';

        const title = document.createElement('h2');
        const preview = createPreview(element);
        title.appendChild(preview.line);

        const description = document.createElement('p');
        description.textContent = 'Unset any value by clearing its input.';

        const table = document.createElement('table');
        table.className = 'config-table';
        const body = document.createElement('tbody');
        const fieldControls = [];

        for (const field of FIELD_DEFINITIONS) {
          const labelCell = document.createElement('td');
          labelCell.className = 'field-label';
          labelCell.textContent = field.label;

          const inputCell = document.createElement('td');
          inputCell.className = 'field-input';
          const input = document.createElement('input');
          input.className = 'config-input';
          input.type = 'text';
          input.placeholder = 'unset';
          input.addEventListener('input', () => {
            updatePreview(element);
          });
          inputCell.appendChild(input);

          inputs.set(toInputKey(element, field.label), input);
          fieldControls.push({ field, labelCell, inputCell });
        }

        const searchText = `${element} ${ELEMENT_FILTER_ALIASES[element] ?? ''} ${fieldControls
          .map((control) => control.field.label)
          .join(' ')}`.toLowerCase();

        cardStates.set(element, { card, body, fieldControls, searchText });
        table.appendChild(body);

        card.appendChild(title);
        card.appendChild(description);
        card.appendChild(table);
        cardsRoot.appendChild(card);

        previews.set(element, preview);
        renderFieldsForElement(element);
      };

      const setStatus = (text, isError = false) => {
        statusNode.textContent = text;
        statusNode.classList.toggle('error', isError);
      };

      const setStyles = (styles) => {
        const source = isRecord(styles) ? styles : {};
        for (const element of markdownElements) {
          const elementStyle = isRecord(source[element]) ? source[element] : {};
          for (const field of FIELD_DEFINITIONS) {
            const input = inputs.get(toInputKey(element, field.label));
            if (!input) {
              continue;
            }
            const value = getNested(elementStyle, field.path);
            input.value = formatFieldValue(field, value);
          }
          updatePreview(element);
        }
        vscode.setState(toStatePayload(source));
      };

      const collectStyles = () => {
        const nextStyles = {};
        for (const element of markdownElements) {
          const result = collectElementStyle(element);
          if (!result.ok) {
            return {
              ok: false,
              element,
              field: result.field,
              message: result.message,
            };
          }
          if (Object.keys(result.style).length > 0) {
            nextStyles[element] = result.style;
          }
        }
        return {
          ok: true,
          styles: nextStyles,
        };
      };

      for (const element of markdownElements) {
        createCard(element);
      }

      renderPresetOptions();
      const state = vscode.getState();
      showAdvanced = state && typeof state.showAdvanced === 'boolean' ? state.showAdvanced : false;
      renderAllFieldRows();
      setStyles(state && state.styles ? state.styles : initialStyles);
      setStatus('Ready');

      saveButton.addEventListener('click', () => {
        const result = collectStyles();
        if (!result.ok) {
          setStatus(`${result.element}.${result.field}: ${result.message}`, true);
          return;
        }
        setStatus('Saving...');
        vscode.postMessage({ type: 'saveStyles', payload: result.styles });
      });

      reloadButton.addEventListener('click', () => {
        setStatus('Reloading settings...');
        vscode.postMessage({ type: 'requestStyles' });
      });

      defaultsButton.addEventListener('click', () => {
        setStyles(defaultStyles);
        setStatus('Styles cleared. Click Save to apply.');
      });

      applyPresetButton.addEventListener('click', () => {
        const selected = normalizedPresets.find((preset) => preset.id === presetSelect.value);
        if (!selected) {
          setStatus('No preset selected.', true);
          return;
        }
        setStyles(readPresetStyles(selected));
        const label = typeof selected.label === 'string' ? selected.label : selected.id;
        setStatus(`Preset loaded: ${label}. Click Save to apply.`);
      });

      toggleAdvancedButton.addEventListener('click', () => {
        showAdvanced = !showAdvanced;
        renderAllFieldRows();
        for (const element of markdownElements) {
          updatePreview(element);
        }
        const currentState = vscode.getState();
        vscode.setState(
          toStatePayload(currentState && isRecord(currentState.styles) ? currentState.styles : initialStyles),
        );
        setStatus(showAdvanced ? 'Advanced options shown.' : 'Advanced options hidden.');
      });

      filterInput.addEventListener('input', () => {
        applyElementFilter();
      });

      window.addEventListener('message', (event) => {
        const message = event.data || {};
        if (message.type === 'syncStyles') {
          setStyles(message.payload || {});
          setStatus('Settings reloaded.');
          return;
        }
        if (message.type !== 'saveResult') {
          return;
        }
        if (message.ok) {
          setStyles(message.payload || {});
          setStatus('Saved.');
          return;
        }
        setStatus(message.message || 'Save failed.', true);
      });
    })();
  </script>
</body>

</html>
