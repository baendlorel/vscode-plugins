<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src '__cspSource__' 'unsafe-inline'; script-src 'nonce-__nonce__';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>"__config-panel.title__"</title>
  <style>
    :root {
      color-scheme: light dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 12px;
      color: var(--vscode-foreground);
      background: var(--vscode-editor-background);
      font-family: var(--vscode-font-family);
      font-size: var(--vscode-font-size);
    }

    button,
    input {
      font: inherit;
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 0 8px;
      background: var(--vscode-editor-background);
    }

    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }

    h2 {
      margin: 14px 0 8px;
      font-size: 13px;
      font-weight: 600;
    }

    .section-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 14px 0 8px;
    }

    .section-heading h2 {
      margin: 0;
    }

    .save {
      border: 0;
      border-radius: 4px;
      padding: 5px 10px;
      color: var(--vscode-button-foreground);
      background: var(--vscode-button-background);
      cursor: pointer;
    }

    .save:hover {
      background: var(--vscode-button-hoverBackground);
    }

    .status {
      min-height: 15px;
      color: var(--vscode-descriptionForeground);
      font-size: 12px;
    }

    details {
      margin-bottom: 6px;
      border: 1px solid var(--vscode-panel-border);
      border-radius: 6px;
      background: var(--vscode-sideBar-background);
    }

    summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 9px;
      cursor: pointer;
      font-weight: 600;
    }

    .summary-meta {
      color: var(--vscode-descriptionForeground);
      font-size: 12px;
      font-weight: 400;
    }

    .import-body {
      border-top: 1px solid var(--vscode-panel-border);
      padding: 8px 9px 9px;
    }

    .import-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .secondary,
    .danger {
      border: 1px solid var(--vscode-button-border, transparent);
      border-radius: 4px;
      padding: 4px 8px;
      color: var(--vscode-button-secondaryForeground);
      background: var(--vscode-button-secondaryBackground);
      cursor: pointer;
    }

    .secondary:hover,
    .danger:hover {
      background: var(--vscode-button-secondaryHoverBackground);
    }

    .danger {
      color: var(--vscode-errorForeground);
    }

    .primary {
      border: 0;
      border-radius: 4px;
      padding: 4px 9px;
      color: var(--vscode-button-foreground);
      background: var(--vscode-button-background);
      cursor: pointer;
    }

    .primary:hover {
      background: var(--vscode-button-hoverBackground);
    }

    .candidate-list,
    .command-list {
      display: grid;
      gap: 5px;
    }

    .candidate {
      display: grid;
      grid-template-columns: 20px minmax(140px, 0.8fr) minmax(140px, 0.8fr) minmax(220px, 1.5fr);
      align-items: center;
      gap: 7px;
      padding: 5px 6px;
      border: 1px solid var(--vscode-panel-border);
      border-radius: 4px;
      background: var(--vscode-editor-background);
    }

    .candidate input[type='checkbox'] {
      width: 16px;
      height: 16px;
      margin: 0;
    }

    .file,
    .candidate-command {
      overflow: hidden;
      color: var(--vscode-descriptionForeground);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .candidate-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty {
      padding: 8px;
      border: 1px dashed var(--vscode-panel-border);
      border-radius: 4px;
      color: var(--vscode-descriptionForeground);
    }

    .error {
      margin-bottom: 8px;
      color: var(--vscode-errorForeground);
    }

    .command-row {
      display: grid;
      grid-template-columns:
        minmax(120px, 0.9fr) minmax(220px, 1.35fr) minmax(120px, 0.85fr) minmax(140px, 0.9fr) 36px;
      gap: 5px;
      align-items: center;
    }

    .command-row input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--vscode-input-border, transparent);
      border-radius: 4px;
      padding: 5px 7px;
      color: var(--vscode-input-foreground);
      background: var(--vscode-input-background);
    }

    .command-row input:focus {
      outline: 1px solid var(--vscode-focusBorder);
      outline-offset: -1px;
    }

    .remove {
      width: 36px;
      height: 28px;
      padding: 0;
    }

    .header-row {
      display: grid;
      grid-template-columns:
        minmax(120px, 0.9fr) minmax(220px, 1.35fr) minmax(120px, 0.85fr) minmax(140px, 0.9fr) 36px;
      gap: 5px;
      margin-bottom: 4px;
      color: var(--vscode-descriptionForeground);
      font-size: 12px;
    }

    @media (max-width: 720px) {
      body {
        padding: 10px;
      }

      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .section-heading {
        align-items: flex-start;
        flex-direction: column;
      }

      .candidate,
      .command-row,
      .header-row {
        grid-template-columns: 1fr;
      }

      .candidate {
        grid-template-columns: 24px 1fr;
      }

      .candidate .file,
      .candidate .candidate-command {
        grid-column: 2;
      }

      .remove {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="toolbar">
      <div>
        <h1>"__config-panel.title__"</h1>
        <div id="status" class="status"></div>
      </div>
      <button id="save" class="save" type="button">"__config-panel.save__"</button>
    </div>

    <section id="imports"></section>

    <section>
      <div class="section-heading">
        <h2>"__config-panel.commands__"</h2>
        <button id="add-command" class="secondary" type="button">"__config-panel.add-command__"</button>
      </div>
      <div class="status" style="margin-bottom: 10px;">"__config-panel.monitor-target.help__"</div>
      <div class="header-row" aria-hidden="true">
        <div>"__config-panel.display-name__"</div>
        <div>"__config-panel.command__"</div>
        <div>"__config-panel.cwd__"</div>
        <div>"__config-panel.monitor-target__"</div>
        <div></div>
      </div>
      <div id="commands" class="command-list"></div>
    </section>
  </main>

  <script nonce="__nonce__">
    const vscode = acquireVsCodeApi();

    window.addEventListener('message', (event) => {
      if (event.data?.type !== 'init') {
        return;
      }

      const state = event.data.state;
      const importsEl = document.getElementById('imports');
      const commandsEl = document.getElementById('commands');
      const addCommandEl = document.getElementById('add-command');
      const saveEl = document.getElementById('save');
      const statusEl = document.getElementById('status');

      let commands = Array.isArray(state.commands) ? state.commands : [];

      const setStatus = (text) => {
        statusEl.textContent = text;
      };

      const format = (template, ...args) =>
        args.reduce((text, arg, index) => text.replace(`{${index}}`, String(arg)), template);

      const sourceTitle = (source) => format('__config-panel.import-from__', source);

      const getSourceSelectedIds = (source) =>
        [...document.querySelectorAll(`input[data-source="${source}"]:checked`)].map((input) => input.value);

      const renderImports = () => {
        importsEl.innerHTML = '';
        importsEl.hidden = !state.showImports;

        if (importsEl.hidden) {
          return;
        }

        if (!Array.isArray(state.sources) || state.sources.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = '__config-panel.no-importable-commands__';
          importsEl.append(empty);
          return;
        }

        for (const group of state.sources) {
          const details = document.createElement('details');
          details.dataset.source = group.source;
          details.open = true;

          const summary = document.createElement('summary');
          const title = document.createElement('span');
          const meta = document.createElement('span');
          title.textContent = sourceTitle(group.source);
          meta.className = 'summary-meta';
          meta.textContent = format('__config-panel.found__', group.commands.length);
          summary.append(title, meta);

          const body = document.createElement('div');
          body.className = 'import-body';

          if (group.error) {
            const error = document.createElement('div');
            error.className = 'error';
            error.textContent = group.error;
            body.append(error);
          }

          if (group.commands.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'empty';
            empty.textContent = format('__config-panel.no-commands-found__', group.source);
            body.append(empty);
          } else {
            const actions = document.createElement('div');
            actions.className = 'import-actions';

            const selectAll = document.createElement('button');
            selectAll.type = 'button';
            selectAll.className = 'secondary';
            selectAll.textContent = '__config-panel.select-all__';
            selectAll.addEventListener('click', () => {
              document.querySelectorAll(`input[data-source="${group.source}"]`).forEach((input) => {
                input.checked = true;
              });
            });

            const clear = document.createElement('button');
            clear.type = 'button';
            clear.className = 'secondary';
            clear.textContent = '__config-panel.clear__';
            clear.addEventListener('click', () => {
              document.querySelectorAll(`input[data-source="${group.source}"]`).forEach((input) => {
                input.checked = false;
              });
            });

            const confirm = document.createElement('button');
            confirm.type = 'button';
            confirm.className = 'primary';
            confirm.textContent = '__config-panel.import-selected__';
            confirm.addEventListener('click', () => {
              const selected = new Set(getSourceSelectedIds(group.source));
              const imports = group.commands
                .filter((command) => selected.has(command.id))
                .map(({ id, sourceFile, ...command }) => command);

              if (imports.length === 0) {
                setStatus('__config-panel.no-commands-selected__');
                return;
              }

              commands = [...commands, ...imports];
              details.open = false;
              renderCommands();
              setStatus(format('__config-panel.imported__', imports.length));
            });

            actions.append(selectAll, clear, confirm);
            body.append(actions);

            const list = document.createElement('div');
            list.className = 'candidate-list';

            for (const candidate of group.commands) {
              const row = document.createElement('label');
              row.className = 'candidate';

              const checkbox = document.createElement('input');
              checkbox.type = 'checkbox';
              checkbox.value = candidate.id;
              checkbox.dataset.source = group.source;

              const file = document.createElement('div');
              file.className = 'file';
              file.title = candidate.sourceFile;
              file.textContent = candidate.sourceFile;

              const name = document.createElement('div');
              name.className = 'candidate-name';
              name.title = candidate.displayName || '';
              name.textContent = candidate.displayName || '';

              const command = document.createElement('div');
              command.className = 'candidate-command';
              command.title = candidate.command;
              command.textContent = candidate.command;

              row.append(checkbox, file, name, command);
              list.append(row);
            }

            body.append(list);
          }

          details.append(summary, body);
          importsEl.append(details);
        }
      };

      const updateCommand = (index, key, value) => {
        commands[index] = {
          ...commands[index],
          [key]: value,
        };
      };

      const isEmptyCommand = (command) =>
        !command.displayName?.trim() &&
        !command.command?.trim() &&
        !command.cwd?.trim() &&
        !command.monitorTarget?.trim();

      const addCommand = () => {
        const lastCommand = commands[commands.length - 1];
        if (lastCommand && isEmptyCommand(lastCommand)) {
          return;
        }

        commands = [...commands, { command: '' }];
        renderCommands();
      };

      const renderCommands = () => {
        commandsEl.innerHTML = '';

        commands.forEach((command, index) => {
          const row = document.createElement('div');
          row.className = 'command-row';

          const displayName = document.createElement('input');
          displayName.placeholder = '__config-panel.display-name__';
          displayName.value = command.displayName || '';
          displayName.addEventListener('input', () => updateCommand(index, 'displayName', displayName.value));

          const commandInput = document.createElement('input');
          commandInput.placeholder = '__config-panel.command__';
          commandInput.value = command.command || '';
          commandInput.addEventListener('input', () => updateCommand(index, 'command', commandInput.value));

          const cwd = document.createElement('input');
          cwd.placeholder = '__config-panel.cwd__';
          cwd.value = command.cwd || '';
          cwd.addEventListener('input', () => updateCommand(index, 'cwd', cwd.value));

          const monitorTarget = document.createElement('input');
          monitorTarget.placeholder = '__config-panel.monitor-target__';
          monitorTarget.value = command.monitorTarget || '';
          monitorTarget.addEventListener('input', () => updateCommand(index, 'monitorTarget', monitorTarget.value));

          const remove = document.createElement('button');
          remove.type = 'button';
          remove.className = 'danger remove';
          remove.title = '__config-panel.remove-command__';
          remove.textContent = '×';
          remove.addEventListener('click', () => {
            commands = commands.filter((_, commandIndex) => commandIndex !== index);
            renderCommands();
          });

          row.append(displayName, commandInput, cwd, monitorTarget, remove);
          commandsEl.append(row);
        });
      };

      const save = () => {
        vscode.postMessage({
          type: 'save',
          commands,
        });
        setStatus('__config-panel.saving__');
      };

      addCommandEl.addEventListener('click', addCommand);
      saveEl.addEventListener('click', save);

      window.addEventListener('keydown', (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 's') {
          event.preventDefault();
          save();
        }
      });

      window.addEventListener('message', (event) => {
        if (event.data?.type !== 'saved') {
          return;
        }

        commands = event.data.commands;
        renderCommands();
        setStatus('__config-panel.saved__');
      });

      renderImports();
      renderCommands();
    });

    vscode.postMessage({ type: 'ready' });

  </script>
</body>

</html>
